}

}

  return PURE_STOCKS_2024[code] || null;
}

// ============ LIVE DATA FETCHER ============
async function fetchLiveData(code, interval = null) {
  const tf = interval || state.timeframe || '1d';
  const cacheKey = `${code}_${tf}`;
  const stock = [
    ...SAUDI_STOCKS,
    ...US_STOCKS,
    ...(state.customStocks.sa || []),
    ...(state.customStocks.us || [])
  ].find(s => s.code === code);
  if (!stock) return null;

  // Different cache time based on timeframe
  const cacheTime = tf === '15m' ? 30000 : tf === '1h' ? 60000 : 300000; // 30s/1m/5m
  const cached = state.liveCache[cacheKey];
  const lastFetch = state.lastFetch[cacheKey] || 0;
  if (cached && (Date.now() - lastFetch) < cacheTime) return cached;

  try {
    state.loading[code] = true;
    // Adjust range based on interval
    let range = '3mo';
    if (tf === '15m') range = '5d';
    else if (tf === '1h') range = '1mo';
    else if (tf === '1wk') range = '2y';

    const response = await fetch(`/api/stock?symbol=${stock.yahoo}&range=${range}&interval=${tf}`);
    if (!response.ok) throw new Error('API failed');
    const data = await response.json();
    if (data.ohlc && data.ohlc.length >= 30) {
      state.liveCache[cacheKey] = data;
      state.lastFetch[cacheKey] = Date.now();
      // Also keep the daily as the main cache
      if (tf === '1d') {
        state.liveCache[code] = data;
        state.lastFetch[code] = Date.now();
      }
      state.loading[code] = false;
      return data;
    }
    throw new Error('Insufficient data');
  } catch (error) {
    console.error('Live fetch failed for', code, error);
    state.loading[code] = false;
    return null;
  }
}

// ============ DATA GENERATION (FALLBACK) ============
function generateSeries(stock) {
  let s = stock.seed;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const data = [];
  let p = stock.base * (1 - stock.trend * 0.15);
  for (let i = 0; i < 60; i++) {
    const cyc = Math.sin(i / 4) * (stock.vol * 0.4);
    const noise = (rand() - 0.5) * stock.vol;
    const drift = stock.trend * (0.6 + rand() * 0.8);
    const open = p;
    p = Math.max(p * (1 + (drift + cyc + noise) / 100), 0.5);
    const close = p;
    const high = Math.max(open, close) * (1 + rand() * 0.008);
    const low = Math.min(open, close) * (1 - rand() * 0.008);
    const volume = Math.round(500000 + rand() * 2500000);
    data.push({
      open: +open.toFixed(2), close: +close.toFixed(2),
      high: +high.toFixed(2), low: +low.toFixed(2), volume
    });
  }
  return data;
}

// ============ INDICATORS ============
const sma = (arr, n) => arr.length < n ? null : arr.slice(-n).reduce((a, b) => a + b, 0) / n;

const emaArr = (arr, n) => {
  if (arr.length < n) return [];
  const k = 2 / (n + 1);
  const r = new Array(arr.length).fill(null);
  let e = arr.slice(0, n).reduce((a, b) => a + b, 0) / n;
  r[n - 1] = e;
  for (let i = n; i < arr.length; i++) { e = arr[i] * k + e * (1 - k); r[i] = e; }
  return r;
};

const ema = (arr, n) => { const e = emaArr(arr, n); return e[e.length - 1]; };

function calcRSI(p, period = 14) {
  if (p.length < period + 1) return null;
  let g = 0, l = 0;
  for (let i = p.length - period; i < p.length; i++) {
    const d = p[i] - p[i - 1];
    if (d >= 0) g += d; else l -= d;
  }
  const ag = g / period, al = l / period;
  if (al === 0) return 100;
  return 100 - 100 / (1 + ag / al);
}

function calcMACD(p) {
  if (p.length < 26) return { macd: null, signal: null, hist: null };
  const e12 = emaArr(p, 12), e26 = emaArr(p, 26);
  const macdLine = p.map((_, i) => (e12[i] != null && e26[i] != null) ? e12[i] - e26[i] : null);
  const valid = macdLine.filter(x => x != null);
  const sigArr = emaArr(valid, 9);
  return { macd: macdLine[macdLine.length - 1], signal: sigArr[sigArr.length - 1], hist: macdLine[macdLine.length - 1] - sigArr[sigArr.length - 1] };
}

function calcATR(o, period = 14) {
  if (o.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < o.length; i++) {
    trs.push(Math.max(o[i].high - o[i].low, Math.abs(o[i].high - o[i-1].close), Math.abs(o[i].low - o[i-1].close)));
  }
  return sma(trs, period);
}

function calcADX(o, period = 14) {
  if (o.length < period * 2) return null;
  const trs = [], pDM = [], mDM = [];
  for (let i = 1; i < o.length; i++) {
    const up = o[i].high - o[i-1].high, dn = o[i-1].low - o[i].low;
    pDM.push(up > dn && up > 0 ? up : 0);
    mDM.push(dn > up && dn > 0 ? dn : 0);
    trs.push(Math.max(o[i].high - o[i].low, Math.abs(o[i].high - o[i-1].close), Math.abs(o[i].low - o[i-1].close)));
  }
  const atr = sma(trs.slice(-period), period);
  if (!atr) return null;
  const pDI = 100 * sma(pDM.slice(-period), period) / atr;
  const mDI = 100 * sma(mDM.slice(-period), period) / atr;
  if (pDI + mDI === 0) return 0;
  return 100 * Math.abs(pDI - mDI) / (pDI + mDI);
}

function calcVWAP(o) {
  const r = o.slice(-20);
  let pv = 0, v = 0;
  r.forEach(d => { const tp = (d.high + d.low + d.close) / 3; pv += tp * (d.volume || 1); v += (d.volume || 1); });
  return v > 0 ? pv / v : null;
}

function calcOBV(o) {
  let obv = 0;
  for (let i = 1; i < o.length; i++) {
    if (o[i].close > o[i-1].close) obv += (o[i].volume || 0);
    else if (o[i].close < o[i-1].close) obv -= (o[i].volume || 0);
  }
  return obv;
}

// ============ ADVANCED INDICATORS ============

// Bollinger Bands - يحدد نطاق التقلب
function calcBollinger(closes, period = 20, stdDev = 2) {
  if (closes.length < period) return null;
  const slice = closes.slice(-period);
  const mean = slice.reduce((a, b) => a + b, 0) / period;
  const variance = slice.reduce((sum, x) => sum + Math.pow(x - mean, 2), 0) / period;
  const std = Math.sqrt(variance);
  const upper = mean + stdDev * std;
  const lower = mean - stdDev * std;
  const last = closes[closes.length - 1];
  // %B = position within bands (0 = at lower, 1 = at upper)
  const pctB = (last - lower) / (upper - lower);
  // Bandwidth = volatility measure
  const bandwidth = ((upper - lower) / mean) * 100;
  return { upper, middle: mean, lower, pctB, bandwidth, last };
}

// Golden/Death Cross detector
function calcMACross(closes) {
  if (closes.length < 200) return null;
  const ma50Now = sma(closes, 50);
  const ma200Now = sma(closes, 200);
  const ma50Prev = sma(closes.slice(0, -1), 50);
  const ma200Prev = sma(closes.slice(0, -1), 200);

  let signal = 'normal';
  let daysAgo = 0;
  // Look back for cross in last 30 days
  for (let i = 1; i <= Math.min(30, closes.length - 200); i++) {
    const prev50 = sma(closes.slice(0, -i - 1), 50);
    const curr50 = sma(closes.slice(0, -i), 50);
    const prev200 = sma(closes.slice(0, -i - 1), 200);
    const curr200 = sma(closes.slice(0, -i), 200);
    if (prev50 < prev200 && curr50 > curr200) {
      signal = 'golden';
      daysAgo = i;
      break;
    }
    if (prev50 > prev200 && curr50 < curr200) {
      signal = 'death';
      daysAgo = i;
      break;
    }
  }

  return {
    ma50: ma50Now,
    ma200: ma200Now,
    above: ma50Now > ma200Now,
    signal,
    daysAgo,
  };
}

function calcSuper(o) {
  const atr = calcATR(o, 10);
  if (!atr) return { value: null, dir: null };
  const last = o[o.length - 1];
  const mid = (last.high + last.low) / 2;
  const dir = last.close > mid ? 'صاعد' : 'هابط';
  return { value: dir === 'صاعد' ? mid - 3 * atr : mid + 3 * atr, dir };
}

function pivots(h, l, c) {
  const p = (h + l + c) / 3;
  return { p, r1: 2*p - l, s1: 2*p - h, r2: p + (h - l), s2: p - (h - l), r3: h + 2*(p - l), s3: l - 2*(h - p) };
}

function fib(h, l) {
  const d = h - l;
  return { f0: h, f50: h - d * 0.5, f618: h - d * 0.618, f786: h - d * 0.786, f100: l };
}

function analyze(o) {
  if (!o || o.length < 30) return null;
  const c = o.map(d => d.close);
  const last = c[c.length - 1], prev = c[c.length - 2];
  const recent = o.slice(-20);
  const high = Math.max(...recent.map(d => d.high));
  const low = Math.min(...recent.map(d => d.low));
  const change = last - prev;
  const changePct = (change / prev) * 100;
  const ma9 = sma(c, 9), ma20 = sma(c, 20);
  const ema200 = ema(c, Math.min(200, c.length));
  const rsi = calcRSI(c);
  const macd = calcMACD(c);
  const atr = calcATR(o);
  const adx = calcADX(o);
  const vwap = calcVWAP(o);
  const obv = calcOBV(o);
  const st = calcSuper(o);
  const piv = pivots(high, low, last);
  const fibs = fib(high, low);

  // Advanced indicators (cleaned - removed redundant ones)
  const bb = calcBollinger(c);
  const maCross = calcMACross(c);

  let score = 0;
  const checks = [];
  const trUp = ma9 > ma20; if (trUp) score++;
  checks.push({ pass: trUp, value: trUp ? 'صاعد' : 'هابط' });
  const aE200 = ema200 && last > ema200; if (aE200) score++;
  checks.push({ pass: !!aE200, value: aE200 ? 'فوق' : 'تحت' });
  const mB = macd.hist > 0; if (mB) score++;
  checks.push({ pass: mB, value: mB ? 'شراء' : 'بيع' });
  const rOk = rsi >= 40 && rsi <= 70; if (rOk) score++;
  checks.push({ pass: rOk, value: rsi > 70 ? 'تشبع شرائي' : rsi < 30 ? 'تشبع بيعي' : 'صحي' });
  const aV = last > vwap; if (aV) score++;
  checks.push({ pass: aV, value: aV ? 'فوق' : 'تحت' });
  const sB = st.dir === 'صاعد'; if (sB) score++;
  checks.push({ pass: sB, value: st.dir });
  const sT = adx > 25; if (sT) score++;
  checks.push({ pass: sT, value: sT ? 'اتجاه قوي' : 'ضعيف' });
  const r10 = o.slice(-10), o10 = o.slice(-20, -10);
  let oR = 0, oO = 0;
  for (let i = 1; i < r10.length; i++) {
    if (r10[i].close > r10[i-1].close) oR += (r10[i].volume || 0);
    else if (r10[i].close < r10[i-1].close) oR -= (r10[i].volume || 0);
  }
  for (let i = 1; i < o10.length; i++) {
    if (o10[i].close > o10[i-1].close) oO += (o10[i].volume || 0);
    else if (o10[i].close < o10[i-1].close) oO -= (o10[i].volume || 0);
  }
  const oUp = oR > oO; if (oUp) score++;
  checks.push({ pass: oUp, value: oUp ? 'تراكم' : 'توزيع' });

  let signal = 'محايد', sc = 'amber';
  if (score >= 7) { signal = 'إشارة شراء قوية'; sc = 'emerald'; }
  else if (score >= 5) { signal = 'إيجابي'; sc = 'emerald'; }
  else if (score >= 3) { signal = 'محايد'; sc = 'amber'; }
  else { signal = 'سلبي'; sc = 'rose'; }

  let trend = 'عرضي';
  if (ma9 > ma20 * 1.005 && last > ma20) trend = 'صاعد';
  else if (ma9 < ma20 * 0.995 && last < ma20) trend = 'هابط';

  const eH = fibs.f50, eL = fibs.f618;
  const sl = Math.min(piv.s2, fibs.f786, last - (atr || 0) * 1.5);
  const t1 = piv.r1, t2 = piv.r2, t3 = high * 1.05;
  const eM = (eH + eL) / 2;
  const risk = eM - sl, reward = t2 - eM;
  const rr = risk > 0 ? reward / risk : 0;

  return {
    last, prev, change, changePct, high, low, ma9, ma20, ema200, rsi, macd, atr, adx, vwap, obv, st,
    pivots: piv, fibs, trend, entryHigh: eH, entryLow: eL, stopLoss: sl,
    target1: t1, target2: t2, target3: t3, rr, signal, signalColor: sc, score, checks,
    bb, maCross
  };
}

// ============ MARKET SENTIMENT (Risk-On / Risk-Off) ============
function calcMarketSentiment() {
  const stocks = getStocks();
  if (stocks.length < 10) return null;

  let advancers = 0, decliners = 0, totalChange = 0;
  let strongUp = 0, strongDown = 0;
  let count = 0;

  stocks.forEach(stock => {
    const ohlc = (state.liveMode && state.liveCache[stock.code]) ? state.liveCache[stock.code].ohlc : generateSeries(stock);
    const a = analyze(ohlc);
    if (!a) return;
    count++;
    totalChange += a.changePct;
    if (a.changePct > 0) advancers++;
    else if (a.changePct < 0) decliners++;
    if (a.changePct > 2) strongUp++;
    if (a.changePct < -2) strongDown++;
  });

  if (count === 0) return null;

  const advanceRatio = advancers / count;
  const avgChange = totalChange / count;
  const breadth = (advancers - decliners) / count;

  // Score: 0-100
  let score = 50; // neutral baseline
  score += avgChange * 5; // each 1% move = 5 points
  score += breadth * 25; // breadth dominance
  score += (strongUp - strongDown) * 1.5; // strong movers
  score = Math.max(0, Math.min(100, score));

  let regime, color, icon, advice;
  if (score >= 70) {
    regime = 'Risk-On';
    color = 'emerald';
    icon = '🟢';
    advice = 'السوق نشط - فرص قوية للشراء';
  } else if (score >= 55) {
    regime = 'إيجابي حذر';
    color = 'sky';
    icon = '🔵';
    advice = 'السوق إيجابي لكن بحذر - اختر الأقوى فقط';
  } else if (score >= 45) {
    regime = 'محايد';
    color = 'amber';
    icon = '🟡';
    advice = 'السوق متذبذب - يفضل المراقبة';
  } else if (score >= 30) {
    regime = 'سلبي حذر';
    color = 'orange';
    icon = '🟠';
    advice = 'السوق ضعيف - تجنب الدخول الجديد';
  } else {
    regime = 'Risk-Off';
    color = 'rose';
    icon = '🔴';
    advice = 'السوق منهار - الكاش هو الملك';
  }

  return {
    score: Math.round(score),
    regime,
    color,
    icon,
    advice,
    advancers,
    decliners,
    avgChange,
    breadth: Math.round(breadth * 100),
    strongUp,
    strongDown,
  };
}

// ============ QUALITY SCORE (A/B/C/D System) ============
function calcQualityScore(stock, a) {
  if (!a) return null;

  let score = 0;
  const positives = [];
  const negatives = [];

  // 1. Signal strength (max 25)
  if (a.score >= 7) { score += 25; positives.push('إشارة قوية'); }
  else if (a.score >= 6) { score += 20; positives.push('إشارة جيدة'); }
  else if (a.score >= 5) { score += 15; }
  else if (a.score >= 3) { score += 8; }
  else { negatives.push('إشارة ضعيفة'); }

  // 2. Trend (max 20)
  if (a.trend === 'صاعد') { score += 20; positives.push('ترند صاعد'); }
  else if (a.trend === 'عرضي') { score += 8; }
  else { negatives.push('ترند هابط'); }

  // 3. Above EMA200 (max 15)
  if (a.ema200 && a.last > a.ema200) {
    score += 15;
    positives.push('فوق EMA200');
  } else {
    negatives.push('تحت EMA200');
  }

  // 4. RSI Healthy zone (max 15)
  if (a.rsi >= 50 && a.rsi <= 65) {
    score += 15;
    positives.push('RSI صحي');
  } else if (a.rsi >= 45 && a.rsi <= 70) {
    score += 10;
  } else if (a.rsi > 75 || a.rsi < 30) {
    score += 0;
    negatives.push(a.rsi > 75 ? 'تشبع شراء' : 'تشبع بيع');
  }

  // 5. ADX strength (max 10)
  if (a.adx > 30) { score += 10; positives.push('ترند قوي'); }
  else if (a.adx > 20) { score += 6; }
  else { negatives.push('ترند ضعيف'); }

  // 6. R/R ratio (max 15)
  if (a.rr >= 2.5) { score += 15; positives.push('R/R ممتاز'); }
  else if (a.rr >= 2) { score += 12; positives.push('R/R جيد'); }
  else if (a.rr >= 1.5) { score += 8; }
  else { negatives.push('R/R ضعيف'); }

  // Apply market sentiment penalty/bonus
  const sentiment = state.marketSentiment;
  if (sentiment) {
    if (sentiment.score >= 70) score = Math.min(100, score * 1.05);
    else if (sentiment.score <= 30) score = score * 0.85;
  }

  score = Math.round(Math.max(0, Math.min(100, score)));

  let grade, gradeColor, action;
  if (score >= 85) {
    grade = 'A';
    gradeColor = 'emerald';
    action = 'فرصة استثنائية';
  } else if (score >= 70) {
    grade = 'B';
    gradeColor = 'sky';
    action = 'فرصة جيدة';
  } else if (score >= 50) {
    grade = 'C';
    gradeColor = 'amber';
    action = 'للمراقبة';
  } else {
    grade = 'D';
    gradeColor = 'rose';
    action = 'تجنب';
  }

  return { score, grade, gradeColor, action, positives, negatives };
}

// ============ TRIPLE CONFIRMATION SYSTEM ============
// Returns full analysis of 3 critical pillars: Trend + Volume + Structure
// ============ BACKTESTING ENGINE ============
// Simulates trading strategies on historical data

function runBacktest(stocks, strategy, daysBack = 252) {
  const results = {
    strategy: strategy.name,
    period: daysBack,
    totalSignals: 0,
    wins: 0,
    losses: 0,
    breakeven: 0,
    open: 0,
    totalReturn: 0,
    maxDrawdown: 0,
    avgWin: 0,
    avgLoss: 0,
    winRate: 0,
    profitFactor: 0,
    sharpe: 0,
    trades: [],
    equityCurve: [],
    bestTrade: null,
    worstTrade: null,
    avgHoldDays: 0,
    bySector: {},
  };

  let totalWinReturn = 0;
  let totalLossReturn = 0;
  let cumulativeReturn = 0;
  let peakReturn = 0;
  const returns = [];

  stocks.forEach(stock => {
    const ohlc = (state.liveMode && state.liveCache[stock.code])
      ? state.liveCache[stock.code].ohlc
      : generateSeries(stock);

    if (!ohlc || ohlc.length < 60) return;

    // Walk through historical data
    const lookback = Math.min(daysBack, ohlc.length - 30);
    const startIdx = ohlc.length - lookback;

    for (let i = startIdx; i < ohlc.length - 5; i++) {
      // Use only data up to this point
      const historicalOhlc = ohlc.slice(0, i + 1);
      const a = analyze(historicalOhlc);
      if (!a) continue;

      // Check if this strategy signals BUY at this point
      let signalFired = false;

      if (strategy.id === 'triple_confirm') {
        const tc = calcTripleConfirmation(stock, historicalOhlc, a);
        signalFired = tc && tc.isReady;
      } else if (strategy.id === 'golden') {
        const q = calcQualityScore(stock, a);
        signalFired = q && (q.grade === 'A' || q.grade === 'B') &&
                      a.trend === 'صاعد' && a.rsi <= 75 && a.rr >= 1.5;
      } else if (strategy.id === 'strong_signal') {
        signalFired = a.score >= 7 && a.trend === 'صاعد';
      } else if (strategy.id === 'breakout') {
        const recent20 = historicalOhlc.slice(-21, -1);
        const high20 = Math.max(...recent20.map(d => d.high));
        signalFired = a.last > high20 && a.score >= 5;
      } else if (strategy.id === 'rsi_oversold') {
        signalFired = a.rsi <= 30 && a.trend !== 'هابط';
      }

      if (!signalFired) continue;

      // Skip if too close to another signal (prevent overlap)
      const lastTrade = results.trades[results.trades.length - 1];
      if (lastTrade && lastTrade.stock === stock.code) {
        const daysSince = i - lastTrade.entryIdx;
        if (daysSince < 5) continue;
      }

      // ENTER: Trade simulation
      const entryPrice = a.entryLow > 0 ? a.entryLow : a.last;
      const target = a.target2;
      const stopLoss = a.stopLoss;

      let exitPrice = null;
      let exitReason = '';
      let exitIdx = i;
      const maxHoldDays = 30;

      // Walk forward to find exit
      for (let j = i + 1; j < Math.min(ohlc.length, i + maxHoldDays); j++) {
        const day = ohlc[j];
        // Check if target hit
        if (day.high >= target) {
          exitPrice = target;
          exitReason = 'هدف';
          exitIdx = j;
          break;
        }
        // Check if stop loss hit
        if (day.low <= stopLoss) {
          exitPrice = stopLoss;
          exitReason = 'وقف';
          exitIdx = j;
          break;
        }
      }

      // If no exit found, close at last available price
      if (!exitPrice) {
        const lastDayIdx = Math.min(ohlc.length - 1, i + maxHoldDays);
        exitPrice = ohlc[lastDayIdx].close;
        exitIdx = lastDayIdx;
        exitReason = 'انتهاء';
      }

      const tradeReturn = ((exitPrice - entryPrice) / entryPrice) * 100;
      const holdDays = exitIdx - i;

      const trade = {
        stock: stock.code,
        stockName: stock.name,
        sector: stock.sector,
        entryIdx: i,
        entryPrice,
        target,
        stopLoss,
        exitPrice,
        exitReason,
        return: tradeReturn,
        holdDays,
      };

      results.trades.push(trade);
      results.totalSignals++;

      if (tradeReturn > 0.5) {
        results.wins++;
        totalWinReturn += tradeReturn;
      } else if (tradeReturn < -0.5) {
        results.losses++;
        totalLossReturn += Math.abs(tradeReturn);
      } else {
        results.breakeven++;
      }

      cumulativeReturn += tradeReturn;
      results.equityCurve.push(cumulativeReturn);
      returns.push(tradeReturn);

      // Track peak and drawdown
      if (cumulativeReturn > peakReturn) {
        peakReturn = cumulativeReturn;
      }
      const drawdown = peakReturn - cumulativeReturn;
      if (drawdown > results.maxDrawdown) {
        results.maxDrawdown = drawdown;
      }

      // Best/worst trade
      if (!results.bestTrade || tradeReturn > results.bestTrade.return) {
        results.bestTrade = trade;
      }
      if (!results.worstTrade || tradeReturn < results.worstTrade.return) {
        results.worstTrade = trade;
      }

      // By sector
      if (!results.bySector[stock.sector]) {
        results.bySector[stock.sector] = { trades: 0, wins: 0, totalReturn: 0 };
      }
      results.bySector[stock.sector].trades++;
      if (tradeReturn > 0) results.bySector[stock.sector].wins++;
      results.bySector[stock.sector].totalReturn += tradeReturn;
    }
  });

  // Calculate final stats
  const closed = results.wins + results.losses + results.breakeven;
  results.winRate = closed > 0 ? (results.wins / (results.wins + results.losses)) * 100 : 0;
  results.totalReturn = cumulativeReturn;
  results.avgWin = results.wins > 0 ? totalWinReturn / results.wins : 0;
  results.avgLoss = results.losses > 0 ? totalLossReturn / results.losses : 0;
  results.profitFactor = totalLossReturn > 0 ? totalWinReturn / totalLossReturn : totalWinReturn > 0 ? 99 : 0;
  results.avgHoldDays = results.trades.length > 0
    ? results.trades.reduce((s, t) => s + t.holdDays, 0) / results.trades.length
    : 0;

  // Sharpe ratio (simplified)
  if (returns.length > 1) {
    const avgReturn = returns.reduce((a, b) => a + b, 0) / returns.length;
    const variance = returns.reduce((s, r) => s + Math.pow(r - avgReturn, 2), 0) / returns.length;
    const stdDev = Math.sqrt(variance);
    results.sharpe = stdDev > 0 ? (avgReturn / stdDev) * Math.sqrt(252) : 0;
  }

  return results;
}

function calcTripleConfirmation(stock, ohlc, a) {
  if (!ohlc || ohlc.length < 30 || !a) return null;

  const last = ohlc[ohlc.length - 1];
  const recent20 = ohlc.slice(-21, -1);

  // ===== 1. TREND CONFIRMATION =====
  const trend = {
    pass: false,
    score: 0,
    reasons: [],
    failures: [],
  };

  // MA9 > MA20 (short-term uptrend)
  if (a.ma9 > a.ma20) {
    trend.score += 30;
    trend.reasons.push('MA9 > MA20');
  } else {
    trend.failures.push('MA9 تحت MA20');
  }

  // Above EMA200 (long-term bullish)
  if (a.ema200 && a.last > a.ema200) {
    trend.score += 30;
    trend.reasons.push('فوق EMA200');
  } else {
    trend.failures.push('تحت EMA200');
  }

  // ADX strength (trend is real, not noise)
  if (a.adx >= 25) {
    trend.score += 25;
    trend.reasons.push(`ADX قوي (${a.adx.toFixed(0)})`);
  } else if (a.adx >= 20) {
    trend.score += 15;
    trend.reasons.push(`ADX مقبول (${a.adx.toFixed(0)})`);
  } else {
    trend.failures.push(`ADX ضعيف (${a.adx.toFixed(0)})`);
  }

  // Supertrend agreement
  if (a.st.dir === 'صاعد') {
    trend.score += 15;
    trend.reasons.push('Supertrend صاعد');
  } else {
    trend.failures.push('Supertrend هابط');
  }

  trend.pass = trend.score >= 70;

  // ===== 2. VOLUME CONFIRMATION =====
  const volume = {
    pass: false,
    score: 0,
    reasons: [],
    failures: [],
  };

  const volumes = recent20.map(d => d.volume || 0);
  const avgVolume = volumes.length > 0 ? volumes.reduce((a, b) => a + b, 0) / volumes.length : 0;
  const todayVol = last.volume || 0;
  const volumeRatio = avgVolume > 0 ? todayVol / avgVolume : 0;

  // Volume spike today
  if (volumeRatio >= 1.5) {
    volume.score += 40;
    volume.reasons.push(`حجم اليوم ${volumeRatio.toFixed(1)}x المتوسط`);
  } else if (volumeRatio >= 1.2) {
    volume.score += 25;
    volume.reasons.push(`حجم مرتفع ${volumeRatio.toFixed(1)}x`);
  } else if (volumeRatio >= 0.9) {
    volume.score += 15;
    volume.reasons.push('حجم طبيعي');
  } else {
    volume.failures.push(`حجم ضعيف (${volumeRatio.toFixed(1)}x)`);
  }

  // Recent volume trend (rising volumes = institutional buying)
  const last5Vols = ohlc.slice(-6, -1).map(d => d.volume || 0);
  const prev10Vols = ohlc.slice(-16, -6).map(d => d.volume || 0);
  const avg5 = last5Vols.reduce((a, b) => a + b, 0) / Math.max(1, last5Vols.length);
  const avg10 = prev10Vols.reduce((a, b) => a + b, 0) / Math.max(1, prev10Vols.length);
  const volumeRising = avg10 > 0 && avg5 / avg10 > 1.1;

  if (volumeRising) {
    volume.score += 30;
    volume.reasons.push('حجم متصاعد آخر 5 جلسات');
  }

  // OBV confirmation (cumulative volume going up)
  const obvNow = a.obv;
  const obv10Ago = calcOBV(ohlc.slice(0, -10));
  if (obvNow > obv10Ago) {
    volume.score += 30;
    volume.reasons.push('OBV صاعد - تجميع');
  } else {
    volume.failures.push('OBV هابط - توزيع');
  }

  volume.pass = volume.score >= 60;
  volume.ratio = volumeRatio;

  // ===== 3. STRUCTURE CONFIRMATION =====
  const structure = {
    pass: false,
    score: 0,
    reasons: [],
    failures: [],
  };

  // Find recent swing high & low
  const recent20Highs = ohlc.slice(-20).map(d => d.high);
  const recent20Lows = ohlc.slice(-20).map(d => d.low);
  const swingHigh = Math.max(...recent20Highs);
  const swingLow = Math.min(...recent20Lows);

  // 1. Near support? (within 3% of low/pivot)
  const nearSupport = a.last <= swingLow * 1.03 || a.last <= a.pivots.s1 * 1.02;
  const aboveSupport = a.last >= swingLow * 0.98;

  if (nearSupport && aboveSupport) {
    structure.score += 35;
    structure.reasons.push('قرب دعم قوي');
  }

  // 2. Breakout: above resistance with confirmation
  const breakingResistance = a.last > swingHigh * 0.98 && a.last >= a.pivots.r1 * 0.99;
  if (breakingResistance) {
    structure.score += 40;
    structure.reasons.push('اختراق مقاومة');
  }

  // 3. Higher highs and higher lows (uptrend structure)
  const last10 = ohlc.slice(-10);
  const first5Of10 = last10.slice(0, 5);
  const last5Of10 = last10.slice(5);
  const firstHigh = Math.max(...first5Of10.map(d => d.high));
  const lastHigh = Math.max(...last5Of10.map(d => d.high));
  const firstLow = Math.min(...first5Of10.map(d => d.low));
  const lastLow = Math.min(...last5Of10.map(d => d.low));

  if (lastHigh > firstHigh && lastLow > firstLow) {
    structure.score += 30;
    structure.reasons.push('قمم/قيعان صاعدة');
  } else if (lastHigh < firstHigh && lastLow < firstLow) {
    structure.failures.push('قمم/قيعان هابطة');
  }

  // 4. Inside entry zone
  if (a.last >= a.entryLow && a.last <= a.entryHigh) {
    structure.score += 20;
    structure.reasons.push('داخل منطقة الدخول');
  } else if (a.last > a.entryHigh * 1.05) {
    structure.failures.push('بعيد عن منطقة الدخول');
  }

  // 5. Risk/Reward
  if (a.rr >= 2) {
    structure.score += 15;
    structure.reasons.push(`R/R ${a.rr.toFixed(1)}:1`);
  } else if (a.rr < 1.5) {
    structure.failures.push(`R/R ضعيف`);
  }

  structure.pass = structure.score >= 60;

  // ===== OVERALL VERDICT =====
  const passedCount = [trend.pass, volume.pass, structure.pass].filter(Boolean).length;
  let verdict, verdictColor, verdictIcon, action;

  if (passedCount === 3) {
    verdict = 'ادخل الآن';
    verdictColor = 'emerald';
    verdictIcon = '🚀';
    action = 'كل الشروط متحققة - فرصة عالية الجودة';
  } else if (passedCount === 2) {
    verdict = 'راقب بحذر';
    verdictColor = 'amber';
    verdictIcon = '⚠️';
    action = 'انتظر تأكيد الشرط الناقص قبل الدخول';
  } else if (passedCount === 1) {
    verdict = 'لا تدخل بعد';
    verdictColor = 'orange';
    verdictIcon = '⏸️';
    action = 'الفرصة ضعيفة - شرط واحد فقط متحقق';
  } else {
    verdict = 'تجنب';
    verdictColor = 'rose';
    verdictIcon = '🛑';
    action = 'لا توجد إشارة دخول - السهم ليس جاهز';
  }

  return {
    trend,
    volume,
    structure,
    passedCount,
    verdict,
    verdictColor,
    verdictIcon,
    action,
    isReady: passedCount === 3,
  };
}

function generateSmartSummary(stock, a, patterns) {
  const parts = [];
  const cur = getCurrency();
  const stockName = stock.name + (stock.ar ? ` (${stock.ar})` : '');
  if (a.trend === 'صاعد' && a.score >= 6) parts.push(`سهم ${stockName} في ترند صاعد قوي مع إشارة فنية إيجابية (${a.score}/8).`);
  else if (a.trend === 'صاعد') parts.push(`سهم ${stockName} في ترند صاعد لكن الإشارات مختلطة (${a.score}/8).`);
  else if (a.trend === 'هابط' && a.score <= 3) parts.push(`سهم ${stockName} في ترند هابط مع إشارات سلبية (${a.score}/8).`);
  else if (a.trend === 'هابط') parts.push(`سهم ${stockName} في ترند هابط مع بعض الإشارات الإيجابية (${a.score}/8).`);
  else parts.push(`سهم ${stockName} يتحرك عرضياً بدون اتجاه واضح (${a.score}/8).`);

  if (a.rsi > 70) parts.push(`مؤشر RSI عند ${a.rsi.toFixed(1)} يشير لتشبع شرائي - احذر من تصحيح قريب.`);
  else if (a.rsi < 30) parts.push(`مؤشر RSI عند ${a.rsi.toFixed(1)} يشير لتشبع بيعي - فرصة ارتداد محتملة.`);

  if (a.last >= a.entryLow && a.last <= a.entryHigh) parts.push(`✓ السعر داخل منطقة الدخول الذهبية (${a.entryLow.toFixed(2)} - ${a.entryHigh.toFixed(2)} ${cur}).`);
  else if (a.last > a.entryHigh) parts.push(`السعر فوق منطقة الدخول، يُفضل انتظار التصحيح إلى ${a.entryHigh.toFixed(2)} ${cur}.`);
  else parts.push(`السعر تحت منطقة الدخول، انتظر إشارة ارتداد قبل الشراء.`);

  parts.push(`أقرب مقاومة: ${a.pivots.r1.toFixed(2)} ${cur} | أقرب دعم: ${a.pivots.s1.toFixed(2)} ${cur}.`);

  if (patterns.length > 0) {
    const bullish = patterns.filter(p => p.type === 'bullish');
    const bearish = patterns.filter(p => p.type === 'bearish');
    if (bullish.length) parts.push(`🕯️ نمط شموع صعودي: ${bullish.map(p => p.name).join('، ')}.`);
    if (bearish.length) parts.push(`🕯️ نمط شموع هبوطي: ${bearish.map(p => p.name).join('، ')}.`);
  }

  if (a.score >= 6 && a.trend === 'صاعد' && a.rr > 1.5) parts.push(`🎯 التوصية: فرصة جيدة، ادخل في منطقة ${a.entryLow.toFixed(2)}-${a.entryHigh.toFixed(2)} ${cur} مع وقف خسارة عند ${a.stopLoss.toFixed(2)}.`);
  else if (a.score <= 2) parts.push(`⚠️ التوصية: تجنب الدخول حالياً، الإشارات ضعيفة جداً.`);
  else parts.push(`📊 التوصية: مراقبة فقط حتى تتضح الإشارات أكثر.`);

  return parts;
}

const fmt = (n, d = 2) => n == null ? '—' : Number(n).toFixed(d);
const fmtBig = (n) => n == null ? '—' : Math.abs(n) >= 1e6 ? (n/1e6).toFixed(1)+'M' : Math.abs(n) >= 1e3 ? (n/1e3).toFixed(1)+'K' : n.toFixed(0);

function getOHLC(code, custom) {
  const stock = getStocks().find(s => s.code === code);
  if (!stock) return null;

  // Priority: 1) Custom data, 2) Live data (cached), 3) Generated
  if (custom && custom.trim()) {
    const p = custom.split(/[\s,،\n]+/).map(x => parseFloat(x.replace(/[^0-9.]/g, ''))).filter(x => !isNaN(x) && x > 0);
    if (p.length >= 30) {
      return p.map((c, i) => {
        const prev = i > 0 ? p[i-1] : c;
        const range = Math.abs(c - prev) * 1.5 + c * 0.005;
        return { open: prev, close: c, high: Math.max(c, prev) + range * 0.3, low: Math.min(c, prev) - range * 0.3, volume: 1000000 };
      });
    }
  }

  if (state.liveMode) {
    const tf = state.timeframe || '1d';
    const cacheKey = `${code}_${tf}`;
    if (state.liveCache[cacheKey]) return state.liveCache[cacheKey].ohlc;
    if (state.liveCache[code]) return state.liveCache[code].ohlc;
  }

  return generateSeries(stock);
}

function detectPatterns(ohlc, supportLevel = null, resistanceLevel = null) {
  const patterns = [];
  if (ohlc.length < 20) return patterns;

  const last = ohlc[ohlc.length - 1];
  const prev = ohlc[ohlc.length - 2];
  const body = Math.abs(last.close - last.open);
  const range = last.high - last.low;
  const upperWick = last.high - Math.max(last.open, last.close);
  const lowerWick = Math.min(last.open, last.close) - last.low;

  // Calculate volume context
  const volumes = ohlc.slice(-21, -1).map(d => d.volume || 0);
  const avgVolume = volumes.length > 0 ? volumes.reduce((a, b) => a + b, 0) / volumes.length : 0;
  const todayVol = last.volume || 0;
  const volumeStrong = avgVolume > 0 && (todayVol / avgVolume) >= 1.3;

  // Check if at key level (within 2% of support or resistance)
  const atSupport = supportLevel && Math.abs(last.low - supportLevel) / supportLevel < 0.02;
  const atResistance = resistanceLevel && Math.abs(last.high - resistanceLevel) / resistanceLevel < 0.02;
  const atKeyLevel = atSupport || atResistance;

  // Helper to add pattern with strength rating
  const addPattern = (name, type, desc) => {
    let strength = 'ضعيفة';
    let strengthColor = 'amber';
    const conditions = [];

    if (atKeyLevel) {
      strength = 'قوية';
      strengthColor = 'emerald';
      conditions.push(atSupport ? 'عند دعم' : 'عند مقاومة');
    }
    if (volumeStrong) {
      conditions.push(`حجم +${((todayVol / avgVolume - 1) * 100).toFixed(0)}%`);
      if (atKeyLevel) {
        strength = 'قوية جداً ⭐';
        strengthColor = 'emerald';
      } else {
        strength = 'متوسطة';
        strengthColor = 'sky';
      }
    }

    patterns.push({
      name,
      type,
      desc,
      strength,
      strengthColor,
      conditions: conditions.length > 0 ? conditions.join(' + ') : 'بدون تأكيد',
      isStrong: atKeyLevel && volumeStrong,
    });
  };

  // Hammer (bullish reversal)
  if (lowerWick > body * 2 && upperWick < body * 0.5 && body > 0) {
    addPattern('مطرقة', 'bullish', 'إشارة انعكاس صعودي محتملة');
  }
  // Shooting Star (bearish reversal)
  if (upperWick > body * 2 && lowerWick < body * 0.5 && body > 0) {
    addPattern('نجمة هابطة', 'bearish', 'إشارة انعكاس هبوطي محتملة');
  }
  // Doji (indecision)
  if (body < range * 0.1 && range > 0) {
    addPattern('دوجي', 'neutral', 'حالة تردد في السوق');
  }
  // Bullish Engulfing
  if (last.close > last.open && prev.close < prev.open && last.close > prev.open && last.open < prev.close) {
    addPattern('ابتلاع صعودي', 'bullish', 'إشارة قوية للارتداد الصعودي');
  }
  // Bearish Engulfing
  if (last.close < last.open && prev.close > prev.open && last.open > prev.close && last.close < prev.open) {
    addPattern('ابتلاع هبوطي', 'bearish', 'إشارة قوية للانعكاس الهبوطي');
  }

  // Filter: only return patterns with at least some confirmation
  // Doji alone is not actionable
  return patterns.filter(p => {
    if (p.name === 'دوجي') return p.isStrong; // Doji only matters at key levels
    return true; // Show others always but with strength rating
  });
}

function renderCandleChart(ohlc, a) {
  const W = 360, H = 280, pad = { t: 10, r: 45, b: 20, l: 5 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const allVals = ohlc.flatMap(d => [d.high, d.low]).concat([a.pivots.r1, a.pivots.r2, a.pivots.s1, a.pivots.s2, a.vwap, a.stopLoss, a.entryHigh, a.entryLow]).filter(v => v != null);
  const minY = Math.min(...allVals) * 0.99;
  const maxY = Math.max(...allVals) * 1.01;
  const yScale = v => pad.t + ch - ((v - minY) / (maxY - minY)) * ch;
  const xScale = i => pad.l + (i / (ohlc.length - 1)) * cw;
  const bw = Math.max(2, cw / ohlc.length * 0.7);

  const candles = ohlc.map((d, i) => {
    const x = xScale(i);
    const isUp = d.close >= d.open;
    const color = isUp ? '#10b981' : '#f43f5e';
    const bodyTop = yScale(Math.max(d.open, d.close));
    const bodyH = Math.max(1, Math.abs(yScale(d.open) - yScale(d.close)));
    return `
      <line x1="${x}" y1="${yScale(d.high)}" x2="${x}" y2="${yScale(d.low)}" stroke="${color}" stroke-width="0.8"/>
      <rect x="${x - bw/2}" y="${bodyTop}" width="${bw}" height="${bodyH}" fill="${color}" stroke="${color}"/>
    `;
  }).join('');

  const closes = ohlc.map(d => d.close);
  const ma9Arr = closes.map((_, i) => i >= 8 ? sma(closes.slice(0, i + 1), 9) : null);
  const ma20Arr = closes.map((_, i) => i >= 19 ? sma(closes.slice(0, i + 1), 20) : null);
  const path = (data) => data.map((v, i) => v == null ? '' : `${i === 0 || data[i-1] == null ? 'M' : 'L'} ${xScale(i)} ${yScale(v)}`).join(' ');
  const yLabel = (v, color, bg) => `
    <rect x="${W - pad.r + 1}" y="${yScale(v) - 7}" width="${pad.r - 2}" height="13" fill="${bg}" rx="2"/>
    <text x="${W - pad.r + 3}" y="${yScale(v) + 3}" font-size="9" fill="${color}" font-family="monospace" font-weight="600">${fmt(v)}</text>
  `;
  const hLine = (v, color, dash, op = 1) => `<line x1="${pad.l}" y1="${yScale(v)}" x2="${W - pad.r}" y2="${yScale(v)}" stroke="${color}" stroke-width="1" stroke-dasharray="${dash}" opacity="${op}"/>`;

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
      <rect x="${pad.l}" y="${pad.t}" width="${cw}" height="${ch}" fill="#0a0a0a"/>
      ${[0.25, 0.5, 0.75].map(p => `<line x1="${pad.l}" y1="${pad.t + ch * p}" x2="${W - pad.r}" y2="${pad.t + ch * p}" stroke="#27272a" stroke-dasharray="2 4"/>`).join('')}
      <rect x="${pad.l}" y="${yScale(a.entryHigh)}" width="${cw}" height="${yScale(a.entryLow) - yScale(a.entryHigh)}" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.3" stroke-dasharray="3 3"/>
      ${hLine(a.pivots.r1, '#f43f5e', '4 4')}
      ${hLine(a.pivots.r2, '#f43f5e', '4 4', 0.4)}
      ${hLine(a.pivots.s1, '#10b981', '4 4')}
      ${hLine(a.pivots.s2, '#10b981', '4 4', 0.4)}
      ${a.vwap ? hLine(a.vwap, '#fbbf24', '2 6', 0.6) : ''}
      ${hLine(a.stopLoss, '#ef4444', '6 2')}
      <path d="${path(ma20Arr)}" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.8"/>
      <path d="${path(ma9Arr)}" fill="none" stroke="#38bdf8" stroke-width="1.2" opacity="0.8"/>
      ${candles}
      ${yLabel(a.pivots.r1, '#fff', '#f43f5e')}
      ${yLabel(a.pivots.s1, '#fff', '#10b981')}
      ${yLabel(a.last, '#000', '#fbbf24')}
      ${yLabel(a.stopLoss, '#fff', '#ef4444')}
    </svg>
  `;
}

function renderMACDChart(ohlc) {
  const W = 360, H = 110, pad = { t: 5, r: 35, b: 15, l: 5 };
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  const closes = ohlc.map(d => d.close);
  const e12 = emaArr(closes, 12), e26 = emaArr(closes, 26);
  const macdLine = closes.map((_, i) => (e12[i] != null && e26[i] != null) ? e12[i] - e26[i] : null);
  const start = macdLine.findIndex(x => x != null);
  const valid = macdLine.slice(start).filter(x => x != null);
  const sigArr = emaArr(valid, 9);
  const sigFull = closes.map((_, i) => { const idx = i - start - 8; return idx >= 0 ? sigArr[idx] : null; });
  const hist = closes.map((_, i) => (macdLine[i] != null && sigFull[i] != null) ? macdLine[i] - sigFull[i] : null);
  const all = [...macdLine, ...sigFull, ...hist].filter(x => x != null);
  const minY = Math.min(...all, 0) * 1.1;
  const maxY = Math.max(...all, 0) * 1.1;
  const yScale = v => pad.t + ch - ((v - minY) / (maxY - minY)) * ch;
  const xScale = i => pad.l + (i / (closes.length - 1)) * cw;
  const zeroY = yScale(0);
  const bw = cw / closes.length * 0.7;
  const bars = hist.map((v, i) => v == null ? '' : `<rect x="${xScale(i) - bw/2}" y="${Math.min(yScale(v), zeroY)}" width="${bw}" height="${Math.abs(yScale(v) - zeroY)}" fill="${v >= 0 ? '#10b981' : '#f43f5e'}" opacity="0.6"/>`).join('');
  const path = (data) => data.map((v, i) => v == null ? '' : `${i === 0 || data[i-1] == null ? 'M' : 'L'} ${xScale(i)} ${yScale(v)}`).join(' ');
  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
      <rect x="${pad.l}" y="${pad.t}" width="${cw}" height="${ch}" fill="#0a0a0a"/>
      <line x1="${pad.l}" y1="${zeroY}" x2="${W - pad.r}" y2="${zeroY}" stroke="#52525b" stroke-width="0.5"/>
      ${bars}
      <path d="${path(macdLine)}" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <path d="${path(sigFull)}" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    </svg>
  `;
}

// ============ GOLDEN OPPORTUNITIES ============
function calcGoldenScore(stock, a) {
  // Strict scoring system - max 10 stars
  let stars = 0;
  const reasons = [];
  const warnings = [];

  // 1. Strong technical signal (must have 7+/8)
  if (a.score >= 7) {
    stars += 2;
    reasons.push(`إشارة قوية ${a.score}/8`);
  } else if (a.score >= 6) {
    stars += 1;
    reasons.push(`إشارة جيدة ${a.score}/8`);
  } else {
    return null; // Not eligible
  }

  // 2. Trend confirmation
  if (a.trend === 'صاعد') {
    stars += 1;
    reasons.push('ترند صاعد مؤكد');
  } else {
    return null; // Must be uptrend
  }

  // 3. Above EMA200 (long-term bullish)
  if (a.ema200 && a.last > a.ema200) {
    stars += 1;
    reasons.push('فوق EMA200');
  }

  // 4. Healthy RSI (not overbought)
  if (a.rsi >= 50 && a.rsi <= 68) {
    stars += 2;
    reasons.push(`RSI صحي ${a.rsi.toFixed(0)}`);
  } else if (a.rsi > 68 && a.rsi < 75) {
    stars += 1;
    warnings.push(`RSI مرتفع ${a.rsi.toFixed(0)}`);
  } else if (a.rsi >= 75) {
    warnings.push(`⚠️ تشبع شرائي ${a.rsi.toFixed(0)}`);
  } else if (a.rsi < 40) {
    return null; // Too weak
  }

  // 5. Strong trend (ADX)
  if (a.adx > 25) {
    stars += 1;
    reasons.push(`اتجاه قوي ADX ${a.adx.toFixed(0)}`);
  } else if (a.adx > 20) {
    stars += 0.5;
  }

  // 6. Good Risk/Reward
  if (a.rr >= 2.5) {
    stars += 2;
    reasons.push(`R/R ممتاز 1:${a.rr.toFixed(1)}`);
  } else if (a.rr >= 1.5) {
    stars += 1;
    reasons.push(`R/R جيد 1:${a.rr.toFixed(1)}`);
  } else if (a.rr < 1) {
    warnings.push('R/R ضعيف');
  }

  // 7. MACD positive
  if (a.macd.hist > 0 && a.macd.macd > 0) {
    stars += 1;
    reasons.push('MACD إيجابي');
  }

  // 8. Price near entry zone
  const inZone = a.last >= a.entryLow && a.last <= a.entryHigh;
  const nearZone = a.last >= a.entryLow * 0.97 && a.last <= a.entryHigh * 1.03;
  if (inZone) {
    stars += 1;
    reasons.push('✓ داخل منطقة الدخول');
  } else if (nearZone) {
    stars += 0.5;
    reasons.push('قريب من منطقة الدخول');
  } else if (a.last > a.entryHigh * 1.05) {
    warnings.push('السعر بعيد عن منطقة الدخول');
  }

  return { stars: Math.min(stars, 10), reasons, warnings };
}

function getStarsRating(stars) {
  if (stars >= 8.5) return { label: 'ذهبي', color: 'amber', emoji: '🏆' };
  if (stars >= 7) return { label: 'ممتاز', color: 'emerald', emoji: '⭐' };
  if (stars >= 5.5) return { label: 'جيد', color: 'sky', emoji: '✨' };
  return null;
}

// ============ MOMENTUM, VOLUME & BREAKOUTS ============
function analyzeMomentum(stock, ohlc, a) {
  if (!ohlc || ohlc.length < 30) return null;

  const last = ohlc[ohlc.length - 1];
  const prev = ohlc[ohlc.length - 2];
  const recent20 = ohlc.slice(-21, -1); // last 20 days excluding today
  const recent52w = ohlc.slice(-Math.min(252, ohlc.length - 1), -1);

  // 1. VOLUME ANALYSIS
  const volumes = recent20.map(d => d.volume || 0);
  const avgVolume = volumes.reduce((a, b) => a + b, 0) / volumes.length;
  const todayVolume = last.volume || 0;
  const volumeRatio = avgVolume > 0 ? todayVolume / avgVolume : 0;

  // 2. PRICE BREAKOUT ANALYSIS
  const high20 = Math.max(...recent20.map(d => d.high));
  const low20 = Math.min(...recent20.map(d => d.low));
  const high52w = recent52w.length > 30 ? Math.max(...recent52w.map(d => d.high)) : null;
  const breakout20 = last.close > high20;
  const breakout52w = high52w && last.close > high52w;
  const nearHigh20 = !breakout20 && (last.close >= high20 * 0.98);

  // 3. PRICE MOMENTUM
  const change1d = ((last.close - prev.close) / prev.close) * 100;
  const close5dAgo = ohlc[ohlc.length - 6]?.close || prev.close;
  const close20dAgo = ohlc[ohlc.length - 21]?.close || prev.close;
  const change5d = ((last.close - close5dAgo) / close5dAgo) * 100;
  const change20d = ((last.close - close20dAgo) / close20dAgo) * 100;

  // 4. SCORING
  let volScore = 0;
  if (volumeRatio >= 3) volScore = 5;
  else if (volumeRatio >= 2) volScore = 4;
  else if (volumeRatio >= 1.5) volScore = 3;
  else if (volumeRatio >= 1.2) volScore = 2;
  else if (volumeRatio >= 1) volScore = 1;

  let breakoutScore = 0;
  if (breakout52w) breakoutScore = 5;
  else if (breakout20) breakoutScore = 3;
  else if (nearHigh20) breakoutScore = 2;

  let momentumScore = 0;
  if (change1d > 4 && change5d > 8) momentumScore = 5;
  else if (change1d > 2 && change5d > 4) momentumScore = 4;
  else if (change1d > 1 && change5d > 2) momentumScore = 3;
  else if (change1d > 0.5) momentumScore = 2;
  else if (change1d > 0) momentumScore = 1;

  // Tags for what's happening
  const tags = [];
  if (volumeRatio >= 3) tags.push({ icon: '💥', text: `انفجار حجم (${volumeRatio.toFixed(1)}x)`, color: 'rose' });
  else if (volumeRatio >= 2) tags.push({ icon: '🔥', text: `حجم مرتفع جداً (${volumeRatio.toFixed(1)}x)`, color: 'amber' });
  else if (volumeRatio >= 1.5) tags.push({ icon: '📈', text: `حجم مرتفع (${volumeRatio.toFixed(1)}x)`, color: 'sky' });

  if (breakout52w) tags.push({ icon: '🚀', text: 'اختراق قمة 52 أسبوع', color: 'amber' });
  else if (breakout20) tags.push({ icon: '⚡', text: 'اختراق قمة 20 يوم', color: 'emerald' });
  else if (nearHigh20) tags.push({ icon: '👀', text: 'يقترب من المقاومة', color: 'sky' });

  if (change1d > 4) tags.push({ icon: '🔥', text: `صاعد +${change1d.toFixed(1)}% اليوم`, color: 'emerald' });

  if (a && a.score >= 6) tags.push({ icon: '✓', text: `إشارة فنية ${a.score}/8`, color: 'emerald' });

  return {
    volumeRatio,
    todayVolume,
    avgVolume,
    high20,
    high52w,
    breakout20,
    breakout52w,
    nearHigh20,
    change1d,
    change5d,
    change20d,
    volScore,
    breakoutScore,
    momentumScore,
    totalScore: volScore + breakoutScore + momentumScore,
    tags,
    last: last.close,
  };
}

const STRATEGIES = {
  scalp: {
    name: 'المضاربة اليومية',
    icon: '⚡',
    color: 'rose',
    desc: 'دخول وخروج خلال نفس اليوم - ربح سريع 1-3%',
    riskLevel: 'مخاطرة عالية',
    timeframe: 'دقائق إلى ساعات',
    target: '1-3%',
    stopLoss: '0.5-1.5%',
    criteria: [
      'انفجار حجم > 1.5x',
      'صعود قوي اليوم > 2%',
      'فوق VWAP',
      'إشارة فنية ≥ 5/8',
    ],
    filter: (a, m) => {
      if (!m || !a) return false;
      return m.volumeRatio >= 1.5 &&
             m.change1d > 1.5 &&
             a.last > a.vwap &&
             a.score >= 5;
    },
    score: (a, m) => {
      let s = 0;
      if (m.volumeRatio >= 3) s += 4;
      else if (m.volumeRatio >= 2) s += 3;
      else if (m.volumeRatio >= 1.5) s += 2;
      if (m.change1d > 4) s += 3;
      else if (m.change1d > 2) s += 2;
      else if (m.change1d > 1) s += 1;
      if (a.score >= 7) s += 3;
      else if (a.score >= 5) s += 2;
      return s;
    }
  },
  swing: {
    name: 'تداول السوينج',
    icon: '📈',
    color: 'emerald',
    desc: 'إمساك السهم عدة أيام لأسابيع - ربح 7-15%',
    riskLevel: 'مخاطرة متوسطة',
    timeframe: '3 أيام - 3 أسابيع',
    target: '7-15%',
    stopLoss: '3-5%',
    criteria: [
      'إشارة فنية ≥ 6/8',
      'ترند صاعد + ADX > 20',
      'RSI صحي 45-65',
      'R/R ≥ 1:2',
    ],
    filter: (a, m) => {
      if (!a) return false;
      return a.score >= 6 &&
             a.trend === 'صاعد' &&
             a.adx > 20 &&
             a.rsi >= 45 && a.rsi <= 68 &&
             a.rr >= 1.8;
    },
    score: (a, m) => {
      let s = 0;
      if (a.score >= 7) s += 3;
      else if (a.score >= 6) s += 2;
      if (a.adx > 30) s += 3;
      else if (a.adx > 25) s += 2;
      else if (a.adx > 20) s += 1;
      if (a.rsi >= 50 && a.rsi <= 65) s += 2;
      if (a.rr >= 2.5) s += 2;
      else if (a.rr >= 2) s += 1;
      return s;
    }
  },
  invest: {
    name: 'الاستثمار طويل الأجل',
    icon: '🏛️',
    color: 'sky',
    desc: 'احتفاظ شهور لسنوات - نمو رأس المال + توزيعات',
    riskLevel: 'مخاطرة منخفضة',
    timeframe: 'شهور إلى سنوات',
    target: '20-50%+',
    stopLoss: '8-12%',
    criteria: [
      'فوق EMA200',
      'ترند صاعد طويل',
      'إشارة فنية ≥ 5/8',
      'ليس في تشبع شرائي',
    ],
    filter: (a, m) => {
      if (!a) return false;
      return a.ema200 && a.last > a.ema200 &&
             a.trend !== 'هابط' &&
             a.score >= 5 &&
             a.rsi < 75;
    },
    score: (a, m) => {
      let s = 0;
      if (a.ema200 && a.last > a.ema200 * 1.05) s += 3;
      else if (a.ema200 && a.last > a.ema200) s += 2;
      if (a.trend === 'صاعد') s += 3;
      else if (a.trend === 'عرضي') s += 1;
      if (a.score >= 6) s += 2;
      if (a.rsi >= 40 && a.rsi <= 65) s += 2;
      return s;
    }
  }
};

// ============ TRADES LOG ============
function renderTrades() {
  const allStocks = [...SAUDI_STOCKS, ...US_STOCKS, ...(state.customStocks.sa || []), ...(state.customStocks.us || [])];

  const enriched = state.trades.map(t => {
    const stock = allStocks.find(s => s.code === t.code);
    if (!stock) return null;
    const market = SAUDI_STOCKS.find(s => s.code === t.code) || (state.customStocks.sa || []).find(s => s.code === t.code) ? 'sa' : 'us';
    const ohlc = (state.liveMode && state.liveCache[t.code]) ? state.liveCache[t.code].ohlc : generateSeries(stock);
    const a = analyze(ohlc);
    if (!a) return null;
    const currentPrice = a.last;
    const pnl = ((currentPrice - t.entry) / t.entry) * 100;
    let status = 'open';
    let exitReason = '';
    if (currentPrice >= t.target) { status = 'win'; exitReason = 'وصل الهدف'; }
    else if (currentPrice <= t.stopLoss) { status = 'loss'; exitReason = 'ضرب وقف الخسارة'; }
    return { ...t, stock, market, currentPrice, pnl, status, exitReason };
  }).filter(Boolean);

  // Sort: open first, then by date
  enriched.sort((a, b) => {
    if (a.status === 'open' && b.status !== 'open') return -1;
    if (b.status === 'open' && a.status !== 'open') return 1;
    return b.date - a.date;
  });

  const closed = enriched.filter(t => t.status !== 'open');
  const wins = closed.filter(t => t.status === 'win').length;
  const losses = closed.filter(t => t.status === 'loss').length;
  const winRate = closed.length > 0 ? (wins / closed.length) * 100 : 0;
  const totalPnl = closed.reduce((sum, t) => sum + t.pnl, 0);
  const open = enriched.filter(t => t.status === 'open');
  const openPnl = open.reduce((sum, t) => sum + t.pnl, 0);

  return `
    <div class="max-w-3xl mx-auto px-4 py-4 space-y-4 slide-in">

      <!-- Header -->
      <div class="bg-gradient-to-bl from-purple-950/40 via-zinc-900 to-zinc-900 border border-purple-500/30 rounded-xl p-4">
        <h2 class="text-lg font-bold text-purple-400 mb-1 flex items-center gap-2">
          <span class="text-2xl">📝</span> سجل التوصيات
        </h2>
        <p class="text-xs text-zinc-400 mb-3">تتبع أداء توصياتك واكتشف نقاط قوتك وضعفك</p>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-2">
          <div class="bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-3">
            <div class="text-[10px] text-emerald-500 mb-0.5">📊 نسبة النجاح</div>
            <div class="mono text-2xl font-bold text-emerald-400">${winRate.toFixed(0)}%</div>
            <div class="text-[10px] text-zinc-500 mt-0.5">${wins} ربح / ${losses} خسارة</div>
          </div>
          <div class="bg-${totalPnl >= 0 ? 'emerald' : 'rose'}-500/10 border border-${totalPnl >= 0 ? 'emerald' : 'rose'}-500/30 rounded-lg p-3">
            <div class="text-[10px] text-${totalPnl >= 0 ? 'emerald' : 'rose'}-500 mb-0.5">💰 الربح/الخسارة</div>
            <div class="mono text-2xl font-bold text-${totalPnl >= 0 ? 'emerald' : 'rose'}-400">${totalPnl >= 0 ? '+' : ''}${totalPnl.toFixed(1)}%</div>
            <div class="text-[10px] text-zinc-500 mt-0.5">${closed.length} توصية مغلقة</div>
          </div>
          <div class="bg-amber-500/10 border border-amber-500/30 rounded-lg p-3">
            <div class="text-[10px] text-amber-500 mb-0.5">🔄 توصيات مفتوحة</div>
            <div class="mono text-2xl font-bold text-amber-400">${open.length}</div>
            <div class="text-[10px] text-zinc-500 mt-0.5">P/L: ${openPnl >= 0 ? '+' : ''}${openPnl.toFixed(1)}%</div>
          </div>
          <div class="bg-zinc-800 border border-zinc-700 rounded-lg p-3">
            <div class="text-[10px] text-zinc-500 mb-0.5">📋 إجمالي التوصيات</div>
            <div class="mono text-2xl font-bold text-zinc-200">${enriched.length}</div>
            <div class="text-[10px] text-zinc-500 mt-0.5">منذ بدء الاستخدام</div>
          </div>
        </div>
      </div>

      ${enriched.length === 0 ? `
        <div class="bg-zinc-900/60 border border-zinc-800 rounded-xl p-8 text-center">
          <div class="text-5xl mb-3">📝</div>
          <h3 class="text-base font-bold text-zinc-300 mb-1">لا توجد توصيات مسجلة</h3>
          <p class="text-xs text-zinc-500 leading-relaxed mb-4">
            عند تحليل أي سهم، اضغط زر 📝 لتسجيل التوصية ومتابعتها
          </p>
          <button onclick="state.tab='golden'; render();" class="px-4 py-2 bg-purple-500/20 border border-purple-500/30 text-purple-400 rounded-lg text-xs font-bold">
            🏆 ابحث عن فرص
          </button>
        </div>

// ============ RELATIVE STRENGTH ============
function calcRelativeStrength(stockOhlc, indexOhlc, period = 20) {
  if (!stockOhlc || !indexOhlc || stockOhlc.length < period || indexOhlc.length < period) return null;

  const stockNow = stockOhlc[stockOhlc.length - 1].close;
  const stockThen = stockOhlc[stockOhlc.length - period].close;
  const indexNow = indexOhlc[indexOhlc.length - 1].close;
  const indexThen = indexOhlc[indexOhlc.length - period].close;

  const stockReturn = ((stockNow - stockThen) / stockThen) * 100;
  const indexReturn = ((indexNow - indexThen) / indexThen) * 100;
  const rs = stockReturn - indexReturn;

  return { stockReturn, indexReturn, rs };
}

// ============ EXPLAIN STOCK ============
function generateExplanation(stock, a, patterns) {
  const explanations = [];
  const cur = state.market === 'sa' ? 'ريال' : '$';

  // Overall verdict
  let verdict = {};
  if (a.score >= 7 && a.trend === 'صاعد') {
    verdict = { icon: '🟢', title: 'فرصة شراء قوية', color: 'emerald', text: 'كل المؤشرات تشير لاتجاه إيجابي قوي. السهم في موقف ممتاز للارتداد أو استكمال الصعود.' };
  } else if (a.score >= 5 && a.trend !== 'هابط') {
    verdict = { icon: '🟡', title: 'إيجابي مع حذر', color: 'amber', text: 'الإشارات إيجابية لكن ليست قوية بشكل قاطع. ادخل تدريجياً مع وقف خسارة محكم.' };
  } else if (a.score <= 3 || a.trend === 'هابط') {
    verdict = { icon: '🔴', title: 'تجنّب الدخول الآن', color: 'rose', text: 'الإشارات سلبية. انتظر ارتداد واضح أو غيّر السهم.' };
  } else {
    verdict = { icon: '⚪', title: 'محايد - راقب فقط', color: 'sky', text: 'السهم في مرحلة ترقب. لا تستعجل الدخول حتى تتضح الصورة.' };
  }

  // Trend explanation
  if (a.trend === 'صاعد') {
    explanations.push({ icon: '📈', title: 'الترند صاعد', good: true, text: `المتوسط ${fmt(a.ma9)} > ${fmt(a.ma20)}، يعني المشترين يسيطرون على السهم الآن.` });
  } else if (a.trend === 'هابط') {
    explanations.push({ icon: '📉', title: 'الترند هابط', good: false, text: `السهم في موجة هبوطية. لا تشتري في ترند هابط - "لا تمسك السكين الساقطة".` });
  } else {
    explanations.push({ icon: '↔️', title: 'الترند عرضي', good: null, text: 'السهم يتذبذب بدون اتجاه واضح. انتظر اختراق واضح للأعلى أو الأسفل.' });
  }

  // RSI
  if (a.rsi > 75) {
    explanations.push({ icon: '🔥', title: `RSI متشبع شراء (${a.rsi.toFixed(0)})`, good: false, text: 'السهم ارتفع كثيراً بسرعة. احذر من تصحيح قريب. لا تطارد.' });
  } else if (a.rsi >= 50 && a.rsi <= 68) {
    explanations.push({ icon: '💪', title: `RSI صحي (${a.rsi.toFixed(0)})`, good: true, text: 'القوة الشرائية متوازنة. ليس متشبع، وفيه مساحة للصعود.' });
  } else if (a.rsi < 30) {
    explanations.push({ icon: '🆘', title: `RSI متشبع بيع (${a.rsi.toFixed(0)})`, good: true, text: 'فرصة ارتداد محتملة - السهم تم بيعه بكثرة. لكن انتظر تأكيد الارتداد.' });
  } else if (a.rsi < 45) {
    explanations.push({ icon: '⚠️', title: `RSI ضعيف (${a.rsi.toFixed(0)})`, good: false, text: 'الزخم الشرائي ضعيف. السهم قد يحتاج وقت للتعافي.' });
  }

  // MACD
  if (a.macd.hist > 0 && a.macd.macd > 0) {
    explanations.push({ icon: '⚡', title: 'MACD إيجابي', good: true, text: 'تأكيد للترند الصاعد - الزخم يدعم الصعود.' });
  } else if (a.macd.hist < 0) {
    explanations.push({ icon: '⚡', title: 'MACD سلبي', good: false, text: 'الزخم لازال سلبي. انتظر تقاطع إيجابي قبل الدخول.' });
  }

  // EMA200
  if (a.ema200 && a.last > a.ema200) {
    const pct = ((a.last - a.ema200) / a.ema200 * 100).toFixed(1);
    explanations.push({ icon: '🏛️', title: `فوق EMA200 بـ ${pct}%`, good: true, text: `السهم في ترند طويل صاعد. هذا أهم خط للمستثمرين على المدى الطويل.` });
  } else if (a.ema200) {
    explanations.push({ icon: '🏛️', title: 'تحت EMA200', good: false, text: 'السهم في ترند طويل هابط. للمستثمرين: تجنب. للمضاربين: ممكن للارتداد فقط.' });
  }

  // ADX
  if (a.adx > 30) {
    explanations.push({ icon: '🔥', title: `اتجاه قوي جداً (ADX ${a.adx.toFixed(0)})`, good: true, text: 'الترند الحالي قوي جداً - استمراريته محتملة.' });
  } else if (a.adx > 25) {
    explanations.push({ icon: '⚡', title: `اتجاه قوي (ADX ${a.adx.toFixed(0)})`, good: true, text: 'الترند صحي ومستقر - مناسب للسوينج.' });
  } else if (a.adx < 15) {
    explanations.push({ icon: '😴', title: `سوق هادئ (ADX ${a.adx.toFixed(0)})`, good: null, text: 'لا يوجد اتجاه واضح. الأنسب الانتظار حتى يتحرك السوق.' });
  }

  // VWAP
  if (a.last > a.vwap) {
    explanations.push({ icon: '✅', title: 'فوق VWAP', good: true, text: 'السعر فوق المتوسط المرجح بالحجم - المؤسسات تشتري.' });
  } else {
    explanations.push({ icon: '⛔', title: 'تحت VWAP', good: false, text: 'السعر تحت المتوسط المرجح - ضغط بيعي.' });
  }

  // Patterns
  if (patterns.length > 0) {
    const bull = patterns.filter(p => p.type === 'bullish');
    const bear = patterns.filter(p => p.type === 'bearish');
    if (bull.length) explanations.push({ icon: '🕯️', title: `نمط صعودي: ${bull[0].name}`, good: true, text: bull[0].desc + ' - إشارة إضافية للارتداد.' });
    if (bear.length) explanations.push({ icon: '🕯️', title: `نمط هبوطي: ${bear[0].name}`, good: false, text: bear[0].desc + ' - احذر، الانعكاس محتمل.' });
  }

  // Trade plan
  const inZone = a.last >= a.entryLow && a.last <= a.entryHigh;
  const tradePlan = {
    inZone,
    text: inZone
      ? `السعر ${fmt(a.last)} داخل منطقة الدخول الذهبية (${fmt(a.entryLow)} - ${fmt(a.entryHigh)} ${cur}). فرصة جيدة للدخول.`
      : a.last < a.entryLow
        ? `السعر ${fmt(a.last)} تحت منطقة الدخول. انتظر ارتداد أو ابحث عن سهم آخر.`
        : `السعر ${fmt(a.last)} فوق منطقة الدخول. لا تطارد - انتظر التصحيح إلى ${fmt(a.entryHigh)} ${cur}.`,
    risk: ((a.entryLow - a.stopLoss) / a.entryLow * 100).toFixed(1),
    reward: ((a.target2 - a.entryLow) / a.entryLow * 100).toFixed(1),
  };

  return { verdict, explanations, tradePlan };
}

function analyzeUserPattern() {
  const trades = state.trades || [];
  const allStocks = [...SAUDI_STOCKS, ...US_STOCKS, ...(state.customStocks.sa || []), ...(state.customStocks.us || [])];

  const enrichedTrades = trades.map(t => {
    const stock = allStocks.find(s => s.code === t.code);
    if (!stock) return null;
    const ohlc = (state.liveMode && state.liveCache[t.code]) ? state.liveCache[t.code].ohlc : generateSeries(stock);
    const a = analyze(ohlc);
    if (!a) return null;
    const currentPrice = a.last;
    const pnl = ((currentPrice - t.entry) / t.entry) * 100;
    let status = 'open';
    if (currentPrice >= t.target) status = 'win';
    else if (currentPrice <= t.stopLoss) status = 'loss';
    return { ...t, stock, pnl, status };
  }).filter(Boolean);

  const closed = enrichedTrades.filter(t => t.status !== 'open');

  // Sector performance
  const sectorStats = {};
  closed.forEach(t => {
    if (!sectorStats[t.stock.sector]) sectorStats[t.stock.sector] = { wins: 0, losses: 0, totalPnl: 0 };
    if (t.status === 'win') sectorStats[t.stock.sector].wins++;
    else sectorStats[t.stock.sector].losses++;
    sectorStats[t.stock.sector].totalPnl += t.pnl;
  });

  // Best sectors
  const bestSectors = Object.entries(sectorStats)
    .map(([sector, s]) => ({ sector, ...s, total: s.wins + s.losses, winRate: s.wins / (s.wins + s.losses) * 100 }))
    .filter(s => s.total >= 1)
    .sort((a, b) => b.winRate - a.winRate);

  // Stocks user has performed well in
  const stockPerformance = {};
  closed.forEach(t => {
    if (!stockPerformance[t.code]) stockPerformance[t.code] = { count: 0, wins: 0, totalPnl: 0 };
    stockPerformance[t.code].count++;
    if (t.status === 'win') stockPerformance[t.code].wins++;
    stockPerformance[t.code].totalPnl += t.pnl;
  });

  return { enrichedTrades, closed, sectorStats, bestSectors, stockPerformance };
}

// ============ CALENDAR ============
function getMarketHours(market) {
  if (market === 'sa') {
    return {
      open: 10, // 10:00 AM
      close: 15, // 3:00 PM
      timezone: 'Asia/Riyadh',
      days: [0, 1, 2, 3, 4], // Sun-Thu
      tz: 'GMT+3',
      name: 'تداول السعودي'
    };
  }
  return {
    open: 9.5, // 9:30 AM
    close: 16, // 4:00 PM
    timezone: 'America/New_York',
    days: [1, 2, 3, 4, 5], // Mon-Fri
    tz: 'GMT-4',
    name: 'الأسواق الأمريكية'
  };
}

function getMarketStatus(market) {
  const hours = getMarketHours(market);
  const now = new Date();

  // Get hour in market's timezone
  const marketTime = new Date(now.toLocaleString('en-US', { timeZone: hours.timezone }));
  const day = marketTime.getDay();
  const hour = marketTime.getHours() + marketTime.getMinutes() / 60;

  const isWorkingDay = hours.days.includes(day);
  const isOpen = isWorkingDay && hour >= hours.open && hour < hours.close;

  let status, color, nextEvent, countdownMs;

  if (isOpen) {
    status = 'مفتوح';
    color = 'emerald';
    const closeTime = new Date(marketTime);
    closeTime.setHours(Math.floor(hours.close), (hours.close % 1) * 60, 0, 0);
    countdownMs = closeTime - marketTime;
    nextEvent = 'يغلق خلال';
  } else {
    status = 'مغلق';
    color = 'rose';
    // Calculate next open
    let nextOpen = new Date(marketTime);
    nextOpen.setHours(Math.floor(hours.open), (hours.open % 1) * 60, 0, 0);

    if (hour >= hours.close || !isWorkingDay) {
      // Move to next day
      do {
        nextOpen.setDate(nextOpen.getDate() + 1);
      } while (!hours.days.includes(nextOpen.getDay()));
    }
    countdownMs = nextOpen - marketTime;
    nextEvent = 'يفتح خلال';
  }

  const hours_left = Math.floor(countdownMs / (1000 * 60 * 60));
  const mins_left = Math.floor((countdownMs % (1000 * 60 * 60)) / (1000 * 60));

  return {
    status, color, nextEvent,
    countdown: `${hours_left}س ${mins_left}د`,
    hours
  };
}

async function sendTelegramMessage(text) {
  const cfg = state.telegramConfig;
  if (!cfg.enabled || !cfg.botToken || !cfg.chatId) return false;
  try {
    const url = `https://api.telegram.org/bot${cfg.botToken}/sendMessage`;
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: cfg.chatId,
        text: text,
        parse_mode: 'HTML',
        disable_web_page_preview: true,
      }),
    });
    return response.ok;
  } catch (e) {
    console.error('Telegram send failed:', e);
    return false;
  }
}

    msg += `   💎 ${o.score.stars.toFixed(1)}/10 نجوم · ${o.analysis.score}/8 إشارة\n`;
    msg += `   💰 السعر: ${fmt(o.analysis.last)} ${cur}\n`;
    msg += `   📥 ${fmt(o.analysis.entryLow)} | 🎯 ${fmt(o.analysis.target2)} | 🛑 ${fmt(o.analysis.stopLoss)}\n\n`;
  });

  msg += `\n📊 منصة التحليل الفني`;

  const success = await sendTelegramMessage(msg);
  if (success) alert('✅ تم إرسال الفرص الذهبية!');
  else alert('❌ فشل الإرسال');
}

function renderBacktestResults(r, strategy) {
  const isProfit = r.totalReturn >= 0;
  const winRateColor = r.winRate >= 60 ? 'emerald' : r.winRate >= 45 ? 'amber' : 'rose';

  // Generate equity curve SVG
  const equity = r.equityCurve;
  const W = 320, H = 120, pad = 10;
  let equitySvg = '';
  if (equity.length > 1) {
    const min = Math.min(0, ...equity);
    const max = Math.max(0, ...equity);
    const range = max - min || 1;
    const points = equity.map((v, i) => {
      const x = pad + (i / (equity.length - 1)) * (W - pad * 2);
      const y = pad + (1 - (v - min) / range) * (H - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const zeroY = pad + (1 - (0 - min) / range) * (H - pad * 2);
    equitySvg = `

function runBacktestNow() {
  state.backtestRunning = true;
  render();

  // Use setTimeout to allow UI to update before heavy computation
  setTimeout(() => {
    const stocks = [...SAUDI_STOCKS, ...US_STOCKS];
    const strategy = BACKTEST_STRATEGIES.find(s => s.id === (state.backtestStrategy || 'triple_confirm'));
    const period = state.backtestPeriod || 252;

    try {
      const results = runBacktest(stocks, strategy, period);
      state.backtestResults = results;
    } catch (e) {
      console.error('Backtest failed:', e);
      alert('❌ فشل تشغيل الاختبار');
    }

    state.backtestRunning = false;
    render();
  }, 100);
}

function renderRisk() {
  const stocks = getStocks();
  const stock = stocks.find(s => s.code === state.code) || stocks[0];
  const ohlc = getOHLC(stock.code, state.custom);
  const a = analyze(ohlc);
  if (!a) return '<div class="p-8 text-center text-zinc-400">جاري التحميل...</div>';
  const cur = getCurrency();
  const entryPrice = (a.entryHigh + a.entryLow) / 2;
  const riskPerShare = entryPrice - a.stopLoss;
  const maxRiskAmount = state.capital * (state.riskPct / 100);
  const positionSize = riskPerShare > 0 ? Math.floor(maxRiskAmount / riskPerShare) : 0;
  const positionValue = positionSize * entryPrice;
  const totalRisk = positionSize * riskPerShare;
  const profit1 = positionSize * (a.target1 - entryPrice);
  const profit2 = positionSize * (a.target2 - entryPrice);
  const profit3 = positionSize * (a.target3 - entryPrice);
  const positionPct = (positionValue / state.capital) * 100;

  return `
    <div class="max-w-3xl mx-auto px-4 py-4 space-y-4 slide-in">
      <div class="bg-gradient-to-bl from-purple-950/30 via-zinc-900 to-zinc-900 border border-purple-500/20 rounded-xl p-4">

      </div>

      <div class="bg-zinc-900/60 border border-zinc-800 rounded-xl p-4 space-y-4">

// ============ ALERTS ============
function renderAlerts() {
  const allStocks = [...SAUDI_STOCKS, ...US_STOCKS, ...(state.customStocks.sa || []), ...(state.customStocks.us || [])];

  // Check smart alerts triggers
  const triggeredAlerts = [];
  state.smartAlerts.forEach((al, idx) => {
    const stock = allStocks.find(s => s.code === al.code);
    if (!stock) return;
    const ohlc = (state.liveMode && state.liveCache[al.code]) ? state.liveCache[al.code].ohlc : generateSeries(stock);
    const a = analyze(ohlc);
    const m = analyzeMomentum(stock, ohlc, a);
    if (!a || !m) return;

    let triggered = false;
    let triggerMsg = '';

    if (al.type === 'breakout' && m.breakout20) {
      triggered = true;
      triggerMsg = `🚀 اخترق قمة 20 يوم (${fmt(m.high20)})`;
    } else if (al.type === 'volume_spike' && m.volumeRatio >= 2) {
      triggered = true;
      triggerMsg = `💥 انفجار حجم ${m.volumeRatio.toFixed(1)}x المتوسط`;
    } else if (al.type === 'rsi_overbought' && a.rsi >= 75) {
      triggered = true;
      triggerMsg = `🔥 RSI متشبع شراء (${a.rsi.toFixed(0)})`;
    } else if (al.type === 'rsi_oversold' && a.rsi <= 30) {
      triggered = true;
      triggerMsg = `🆘 RSI متشبع بيع (${a.rsi.toFixed(0)})`;
    } else if (al.type === 'ma_cross' && a.ma9 > a.ma20 && a.macd.hist > 0) {
      triggered = true;
      triggerMsg = `📈 تقاطع MA9 فوق MA20 (إشارة شراء)`;
    } else if (al.type === 'strong_signal' && a.score >= 7) {
      triggered = true;
      triggerMsg = `⭐ إشارة قوية ${a.score}/8`;
    } else if (al.type === 'triple_confirm') {
      const tc = calcTripleConfirmation(stock, ohlc, a);
      if (tc && tc.isReady) {
        triggered = true;
        triggerMsg = `🎯 تأكيد ثلاثي مكتمل - ادخل الآن!`;
      }
    }

    if (triggered) triggeredAlerts.push({ ...al, idx, stock, msg: triggerMsg });
  });

  return `
    <div class="max-w-3xl mx-auto px-4 py-4 space-y-4 slide-in">
      <div class="bg-gradient-to-bl from-pink-950/30 via-zinc-900 to-zinc-900 border border-pink-500/20 rounded-xl p-4">
        <h2 class="text-base font-bold text-pink-400 mb-1 flex items-center gap-2"><span>🔔</span> التنبيهات</h2>
        <p class="text-xs text-zinc-400">اضبط تنبيهات للأسعار والأحداث الفنية</p>
      </div>

      <!-- Triggered Smart Alerts -->
      ${triggeredAlerts.length > 0 ? `
        <div class="bg-emerald-500/10 border border-emerald-500/30 rounded-xl overflow-hidden glow-emerald">
          <div class="p-3 border-b border-emerald-500/30 bg-emerald-500/10">
            <h3 class="text-sm font-bold text-emerald-400 flex items-center gap-2">
              <span class="live-dot w-2 h-2 bg-emerald-500 rounded-full"></span>
              🎯 تنبيهات مفعّلة الآن (${triggeredAlerts.length})
            </h3>
          </div>
          ${triggeredAlerts.map(t => `
            <div onclick="state.tab='analyze'; state.code='${t.code}'; render();" class="p-3 border-b border-emerald-500/20 last:border-0 cursor-pointer hover:bg-emerald-500/5">
              <div class="flex items-center justify-between mb-1">
                <div class="text-sm font-bold">${t.stock.name} <span class="text-[10px] text-zinc-500">${t.code}</span></div>
                <button onclick="event.stopPropagation(); deleteSmartAlert(${t.idx});" class="text-rose-400 text-xs">🗑️</button>
              </div>
              <div class="text-[11px] text-emerald-400">${t.msg}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <!-- Tabs -->
      <div class="grid grid-cols-2 gap-2">
        <button onclick="state.alertsTab='price'; render();" class="py-2.5 rounded-lg text-xs font-bold transition ${state.alertsTab === 'price' ? 'bg-pink-500 text-zinc-950' : 'bg-zinc-900 text-zinc-400 border border-zinc-800'}">
          💰 تنبيهات الأسعار
        </button>
        <button onclick="state.alertsTab='smart'; render();" class="py-2.5 rounded-lg text-xs font-bold transition ${state.alertsTab === 'smart' ? 'bg-fuchsia-500 text-zinc-950' : 'bg-zinc-900 text-zinc-400 border border-zinc-800'}">

      </div>

      ${state.alertsTab === 'price' ? `

// ============ Performance: Debounced render ============
let renderScheduled = false;
let renderTimeout = null;

function renderDebounced() {
  if (renderScheduled) return;
  renderScheduled = true;
  // Use requestAnimationFrame for smooth rendering
  requestAnimationFrame(() => {
    render();
    renderScheduled = false;
  });
}

function render() {
  let content = '';
  if (state.tab === 'analyze') content = renderAnalyze();
  else if (state.tab === 'golden') content = renderGolden();
  else if (state.tab === 'momentum') content = renderMomentum();
  else if (state.tab === 'strategies') content = renderStrategies();
  else if (state.tab === 'ai') content = renderAI();
  else if (state.tab === 'backtest') content = renderBacktest();
  else if (state.tab === 'heatmap') content = renderHeatmap();
  else if (state.tab === 'rs') content = renderRS();
  else if (state.tab === 'favorites') content = renderFavorites();
  else if (state.tab === 'trades') content = renderTrades();
  else if (state.tab === 'calendar') content = renderCalendar();
  else if (state.tab === 'telegram') content = renderTelegram();
  else if (state.tab === 'scanner') content = renderScanner();
  else if (state.tab === 'compare') content = renderCompare();
  else if (state.tab === 'risk') content = renderRisk();
  else if (state.tab === 'alerts') content = renderAlerts();
  else if (state.tab === 'settings') content = renderSettings();

  document.getElementById('app').innerHTML = renderHeader() + content;

  const sel = document.getElementById('stockSel');
  if (sel) sel.onchange = (e) => { state.code = e.target.value; state.custom = ''; render(); };

  const search = document.getElementById('searchInput');
  if (search) search.oninput = (e) => { state.search = e.target.value; render(); };

  const ti = document.getElementById('toggleInput');
  if (ti) ti.onclick = () => { state.showInput = !state.showInput; render(); };

  const ac = document.getElementById('applyCustom');
  if (ac) ac.onclick = () => { state.custom = document.getElementById('customInput').value; render(); };

  const rsel = document.getElementById('riskStockSel');
  if (rsel) rsel.onchange = (e) => { state.code = e.target.value; render(); };

  const ci = document.getElementById('capitalInput');
  if (ci) ci.onchange = (e) => { state.capital = parseInt(e.target.value) || 50000; render(); };

  // Check deployment status on settings tab

// ============ GOLDEN OPPORTUNITIES AUTO-REFRESH ============
let goldenRefreshTimer = null;
let goldenCountdownTimer = null;

function startGoldenAutoRefresh() {
  if (!state.goldenAutoRefresh) return;
  stopGoldenAutoRefresh(); // Clear any existing

  // Schedule next refresh
  state.goldenNextRefresh = Date.now() + (state.goldenRefreshInterval * 1000);

  goldenRefreshTimer = setTimeout(async () => {
    await refreshGoldenNow();
    // After refresh, schedule next one
    if (state.goldenAutoRefresh && state.tab === 'golden') {
      startGoldenAutoRefresh();
    }
  }, state.goldenRefreshInterval * 1000);

  // Countdown timer to update UI every second
  if (!goldenCountdownTimer) {
    goldenCountdownTimer = setInterval(() => {
      if (state.tab === 'golden' && state.goldenAutoRefresh) {
        const countdownEl = document.getElementById('goldenCountdown');
        if (countdownEl) {
          const remaining = Math.max(0, Math.ceil((state.goldenNextRefresh - Date.now()) / 1000));
          const mins = Math.floor(remaining / 60);
          const secs = remaining % 60;
          countdownEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }
      }
    }, 1000);
  }
}

function stopGoldenAutoRefresh() {
  if (goldenRefreshTimer) {
    clearTimeout(goldenRefreshTimer);
    goldenRefreshTimer = null;
  }
}

async function refreshGoldenNow() {
  state.goldenRefreshing = true;
  render();

  // Save current count for comparison
  const allStocks = [...SAUDI_STOCKS, ...US_STOCKS, ...(state.customStocks.sa || []), ...(state.customStocks.us || [])];
  const prevOpsCount = state.goldenPrevCount || 0;

  if (state.liveMode) {
    // Refresh all stocks data
    const promises = [];
    let count = 0;
    for (const stock of allStocks) {
      const cacheKey = `${stock.code}_${state.timeframe || '1d'}`;
      // Force refresh by clearing lastFetch
      delete state.lastFetch[cacheKey];
      delete state.lastFetch[stock.code];

      promises.push(fetchLiveData(stock.code));
      count++;

      // Rate limit: 10 at a time
      if (count % 10 === 0) {
        await Promise.all(promises.splice(0, 10));
        await new Promise(r => setTimeout(r, 200));
      }
    }
    if (promises.length > 0) await Promise.all(promises);
  }

  state.goldenLastRefresh = Date.now();
  state.goldenRefreshing = false;

  // Calculate new opportunities count
  let newOpsCount = 0;
  allStocks.forEach(stock => {
    const ohlc = (state.liveMode && state.liveCache[stock.code]) ? state.liveCache[stock.code].ohlc : generateSeries(stock);
    const a = analyze(ohlc);
    if (!a) return;
    const score = calcGoldenScore(stock, a);
    if (score && score.stars >= 5.5) newOpsCount++;
  });

  // Detect new opportunities
  if (newOpsCount > prevOpsCount && prevOpsCount > 0) {
    const newCount = newOpsCount - prevOpsCount;
    showGoldenNotification(`🎯 ${newCount} فرصة جديدة!`);
  }

  state.goldenPrevCount = newOpsCount;
  render();
}

function showGoldenNotification(message) {
  // Create a temporary notification
  const notif = document.createElement('div');
  notif.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-gradient-to-l from-amber-500 to-amber-600 text-zinc-950 px-4 py-2 rounded-full font-bold shadow-2xl';
  notif.textContent = message;
  notif.style.animation = 'slideDownFade 0.5s ease-out';
  document.body.appendChild(notif);

  // Play sound (optional - silent if not allowed)
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch (e) { /* silent */ }

  // Remove after 4 seconds
  setTimeout(() => {
    notif.style.animation = 'slideUpFade 0.3s ease-in';
    setTimeout(() => notif.remove(), 300);
  }, 4000);

  // Send to Telegram if enabled
  if (state.telegramConfig.enabled) {
    sendTelegramMessage(`🏆 <b>تنبيه الفرص الذهبية</b>\n\n${message}\n\n⏰ ${new Date().toLocaleTimeString('ar')}`).catch(() => {});
  }
}

function addCustomStock() {
  const codeInput = document.getElementById('newStockCode');
  const nameInput = document.getElementById('newStockName');
  const sectorInput = document.getElementById('newStockSector');
  const arInput = document.getElementById('newStockAr');

  let code = (codeInput?.value || '').trim().toUpperCase();
  const name = (nameInput?.value || '').trim();
  const sector = (sectorInput?.value || '').trim() || 'مخصص';
  const ar = (arInput?.value || '').trim();

  if (!code) { alert('⚠️ أدخل رمز السهم'); return; }
  if (!name) { alert('⚠️ أدخل اسم الشركة'); return; }

  // Auto-add .SR for Saudi stocks if not present
  let yahoo = code;
  if (state.market === 'sa' && !code.includes('.')) {
    yahoo = code + '.SR';
  }

  // Check duplicates
  const allStocks = [...SAUDI_STOCKS, ...US_STOCKS, ...(state.customStocks.sa || []), ...(state.customStocks.us || [])];
  if (allStocks.find(s => s.code === code)) {
    alert('⚠️ هذا السهم موجود بالفعل');
    return;
  }

  // Generate seed from code for consistent demo data
  let seed = 0;
  for (let i = 0; i < code.length; i++) seed += code.charCodeAt(i) * (i + 1);

  const newStock = {
    code,
    yahoo,
    name,
    sector,
    base: 100, // default price for fallback
    trend: 0.1,
    vol: 1.5,
    seed: seed % 1000,
    isCustom: true,
  };

  if (state.market === 'us') newStock.ar = ar || name;
  else newStock.en = ar || code;

  if (!state.customStocks[state.market]) state.customStocks[state.market] = [];
  state.customStocks[state.market].push(newStock);
  localStorage.setItem('customStocks', JSON.stringify(state.customStocks));

  // Switch to the new stock
  state.code = code;
  state.showAddStock = false;

  // If live mode is on, fetch immediately
  if (state.liveMode) {
    fetchLiveData(code).then(() => render());
  }

  render();
}

function removeCustomStock(code) {
  if (!confirm(`هل تريد حذف السهم ${code}؟`)) return;
  state.customStocks[state.market] = (state.customStocks[state.market] || []).filter(s => s.code !== code);

  }

  // Remove from compare list if present
  state.compareCodes = state.compareCodes.filter(c => c !== code);

  render();
}

// ============ PWA: Service Worker Registration ============
if ('serviceWorker' in navigator) {
  // Create a minimal service worker as a Blob URL for caching
  const swCode = `
    const CACHE_NAME = 'stocks-v2-cache-v1';
    const urlsToCache = [
      '/',
      'https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap',
      'https://cdn.tailwindcss.com'
    ];

    self.addEventListener('install', event => {
      event.waitUntil(
        caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache).catch(() => {}))
      );
      self.skipWaiting();
    });

    self.addEventListener('activate', event => {
      event.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', event => {
      // Network first for API calls
      if (event.request.url.includes('/api/')) {
        event.respondWith(fetch(event.request).catch(() => caches.match(event.request)));
        return;
      }
      // Cache first for static assets
      event.respondWith(
        caches.match(event.request).then(response => response || fetch(event.request))
      );
    });
  `;

  // Register SW if Blob is supported (most modern browsers)
  try {
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    // Note: Service workers from Blob URLs are not supported by all browsers
    // For production, place a real /sw.js file
    // We'll skip blob-based SW registration to avoid issues
  } catch (e) { /* silent */ }
}
